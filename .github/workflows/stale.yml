name: Close stale issues and PRs

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@5bef64f19d7facfb25b37b414482c7164d639639 # v9
        with:
          days-before-issue-stale: 60
          days-before-issue-close: 14
          stale-issue-label: 'stale'
          stale-issue-message: |
            This issue has been automatically marked as stale because it has not had recent activity.
            It will be closed in 14 days if no further activity occurs. Comment to keep it open.
          close-issue-message: |
            Closing this issue due to inactivity. Feel free to reopen if it's still relevant.
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-pr-label: 'stale'
          stale-pr-message: |
            This PR has been automatically marked as stale due to inactivity.
            It will be closed in 14 days if no further activity occurs.
          close-pr-message: |
            Closing this PR due to inactivity. Feel free to reopen when ready.
          exempt-issue-labels: 'pinned,security,roadmap,help wanted,good first issue'
          exempt-pr-labels: 'pinned,security,work-in-progress'
          operations-per-run: 100
