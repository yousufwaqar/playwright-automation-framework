name: Quality Gate

# Single authoritative CI pipeline. Runs each test module as its own job so every
# quality dimension is an independent, visible check, then aggregates the blocking
# ones into a final `quality-gate` status. Replaces the old playwright-ci.yml to
# avoid running the same tests twice.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes, but never cancel a
# main run mid-flight: it may be deploying the Allure report to Pages and an
# aborted deploy would drop accumulated trend history.
concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CI: "true"
  BASE_URL: http://localhost:3000
  API_BASE_URL: http://localhost:3000/api/v1
  TEST_ENV: ci
  API_TOKEN: mock-jwt-token-12345

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm run test:unit
      - name: Spell check
        run: npx cspell "**/*.{ts,js,md}" --no-progress || true

  functional:
    name: Functional & API
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.60.0-jammy
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - run: npm ci
      - name: Run functional + API tests
        run: npm run test:functional
      - name: Run CI Quality Analysis
        if: always()
        run: |
          node scripts/ci-failure-analyzer.js
          if [ -f test-results/ci-quality-summary.md ]; then
            cat test-results/ci-quality-summary.md >> $GITHUB_STEP_SUMMARY
          fi
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: report-functional
          path: playwright-report/
          retention-days: 14
      - name: Upload Allure results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: allure-results
          path: allure-results/
          if-no-files-found: ignore
          retention-days: 14

  accessibility:
    name: Accessibility (a11y)
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.60.0-jammy
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - run: npm ci
      - name: Run axe-core WCAG audits
        run: npm run test:a11y
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: report-a11y
          path: playwright-report/
          retention-days: 14

  security:
    name: API & HTTP Security
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.60.0-jammy
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - run: npm ci
      - name: Run security tests
        run: npm run test:security
      - name: Dependency vulnerability audit
        run: npm audit --omit=dev --audit-level=high
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: report-security
          path: playwright-report/
          retention-days: 14

  performance:
    name: Performance Smoke (non-blocking)
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.60.0-jammy
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - run: npm ci
      - name: Run performance smoke tests
        run: npm run test:performance

  visual:
    name: Visual Regression (non-blocking)
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.60.0-jammy
    # Non-blocking until Linux baselines are generated via the
    # "Update Visual Baselines" workflow (visual-baseline.yml).
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - run: npm ci
      - name: Run visual regression tests
        run: npm run test:visual
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: report-visual
          path: playwright-report/
          retention-days: 14

  k6-load:
    name: k6 API Load (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: ".nvmrc"
      - run: npm ci
      - name: Start mock app
        run: |
          node mock-app/server.js &
          sleep 2
          curl -f http://localhost:3000/api/v1/health
      - name: Install k6
        uses: grafana/setup-k6-action@db07bd9765aac508ef18982e52ab937fe633a065 # v1
      - name: Run k6 load test
        run: k6 run performance/k6/api-load.js

  cross-browser:
    name: Cross-browser FF/WebKit (non-blocking)
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.60.0-jammy
    # Firefox refuses to launch when $HOME is not owned by the current user.
    # GitHub Actions sets HOME=/github/home inside containers; point it at the
    # root-owned /root so Firefox launches in the Playwright image.
    env:
      HOME: /root
    # Chromium is the blocking gate (see the `functional` job). Firefox and WebKit
    # run here as an optional signal; the Playwright container ships both engines.
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - run: npm ci
      - name: Run functional suite across Chromium, Firefox and WebKit
        run: npm run test:cross-browser
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: report-cross-browser
          path: playwright-report/
          retention-days: 14

  allure-report:
    name: Allure Report (non-blocking)
    runs-on: ubuntu-latest
    # Builds the rich Allure HTML report from the results produced by the
    # functional job. Runs on the host runner (not the Playwright container)
    # because the Allure CLI needs a JRE. Non-blocking and excluded from the
    # quality-gate aggregation; published as a downloadable artifact.
    needs: [functional]
    if: always()
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      - run: npm ci
      - name: Set up Java (required by the Allure CLI)
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Download Allure results
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: allure-results
          path: allure-results
      - name: Restore Allure history from the live Pages site
        # On main, seed the new run with the previously published history so the
        # generated report accumulates trend/retry/duration charts over time.
        # First run 404s are ignored (|| true); Allure then bootstraps history.
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        run: |
          mkdir -p allure-results/history
          base="https://yousufwaqar.github.io/playwright-automation-framework/history"
          for f in history.json history-trend.json duration-trend.json categories-trend.json retry-trend.json retries-trend.json; do
            curl -fsSL "$base/$f" -o "allure-results/history/$f" || true
          done
      - name: Write Allure executor metadata
        # Gives trend entries a build order, name and links back to this run.
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        run: |
          cat > allure-results/executor.json <<EOF
          {
            "name": "GitHub Actions",
            "type": "github",
            "reportName": "${GITHUB_WORKFLOW} #${GITHUB_RUN_NUMBER}",
            "buildOrder": ${GITHUB_RUN_NUMBER},
            "buildName": "${GITHUB_WORKFLOW} #${GITHUB_RUN_NUMBER}",
            "buildUrl": "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}",
            "reportUrl": "https://yousufwaqar.github.io/playwright-automation-framework/"
          }
          EOF
      - name: Generate Allure HTML report
        run: npm run allure:generate
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: allure-report
          path: allure-report/
          retention-days: 14

  publish-pages:
    name: Publish Allure to Pages (non-blocking)
    # Deploys the generated Allure report to GitHub Pages, but only for main
    # pushes (not PRs or develop). `always()` keeps it eligible even though the
    # upstream allure-report job is continue-on-error; a missing artifact just
    # fails this job non-blockingly.
    needs: [allure-report]
    if: ${{ always() && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    continue-on-error: true
    # Serialise Pages deploys so a newer run never aborts an in-flight deploy.
    concurrency:
      group: github-pages
      cancel-in-progress: false
    permissions:
      actions: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download generated Allure report
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: allure-report
          path: allure-report
      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: allure-report
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    # Only the deterministic, blocking modules are required to pass.
    needs: [lint-typecheck, functional, accessibility, security]
    steps:
      - name: All required quality checks passed
        run: echo "✅ Functional, accessibility, security and lint/typecheck all green."
