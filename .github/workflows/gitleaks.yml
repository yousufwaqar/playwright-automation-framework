name: Secret Scan

# Scans for hard-coded secrets (API keys, tokens, private keys) with gitleaks.
# On pull requests it scans the PR commits; on the weekly schedule and manual
# runs it scans the full history (fetch-depth 0). gitleaks-action is free for
# public and personal repositories, so no licence secret is required.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: Detect hard-coded secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
