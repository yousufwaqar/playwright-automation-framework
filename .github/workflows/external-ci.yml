name: External Demo Sites

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  external:
    name: Run External Suites
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true

    strategy:
      fail-fast: false
      matrix:
        project: [chromium]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.project }}

      - name: Run external test suites
        run: npx playwright test --project=${{ matrix.project }} --grep @external
        env:
          CI: true
          NODE_OPTIONS: "--import tsx"

      - name: Upload external test report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: external-report-${{ matrix.project }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14
