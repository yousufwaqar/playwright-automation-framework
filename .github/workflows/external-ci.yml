name: External Demo Sites

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  external:
    name: Run External Suites
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true

    strategy:
      fail-fast: false
      matrix:
        project: [chromium]

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.project }}

      - name: Run external test suites
        run: npx playwright test --project=${{ matrix.project }} --grep @external
        env:
          CI: true
          NODE_OPTIONS: "--import tsx"

      - name: Upload external test report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: external-report-${{ matrix.project }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14
