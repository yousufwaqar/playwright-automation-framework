name: Spellcheck

on:
  pull_request:
    paths:
      - '**/*.md'
      - '**/*.ts'
      - '**/*.js'
      - 'cspell.json'

jobs:
  cspell:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Run cspell (advisory only)
        continue-on-error: true
        run: |
          npx --yes cspell --no-progress --gitignore "**/*.{md,ts,js}" || \
          echo "::warning::cspell found typos. Review the log above. This check is advisory and does not block merging."
