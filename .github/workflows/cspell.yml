name: Spellcheck

on:
  pull_request:
    paths:
      - '**/*.md'
      - '**/*.ts'
      - '**/*.js'
      - 'cspell.json'

jobs:
  cspell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Run cspell
        run: npx --yes cspell --no-progress --gitignore "**/*.{md,ts,js}"
