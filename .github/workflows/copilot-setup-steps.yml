name: "Copilot Setup Steps"

# Prepares the GitHub Copilot cloud agent's environment so it can install
# dependencies and run the Playwright suite (and the Quality Gate locally) to
# verify its own changes. Also runs on changes to this file so it stays valid.
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be named `copilot-setup-steps` for Copilot to pick it up.
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        # Chromium is the blocking gate; Firefox and WebKit let the agent run the
        # optional cross-browser suite too.
        run: npx playwright install --with-deps chromium firefox webkit
