name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: '🚀 Features'
    labels: [feature, enhancement]
  - title: '🐛 Bug Fixes'
    labels: [fix, bugfix, bug]
  - title: '⚡ Performance'
    labels: [performance, perf]
  - title: '📚 Documentation'
    labels: [documentation, docs]
  - title: '🧪 Tests'
    labels: [test, tests]
  - title: '🔒 Security'
    labels: [security]
  - title: '⬆️ Dependencies'
    labels: [dependencies]
    collapse-after: 5
  - title: '🧹 Maintenance'
    labels: [chore, maintenance, refactor]

change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels: [major, breaking-change]
  minor:
    labels: [minor, feature, enhancement]
  patch:
    labels: [patch, fix, bug, chore, documentation, dependencies]
  default: patch

autolabeler:
  - label: 'documentation'
    files: ['*.md', 'docs/**/*']
  - label: 'tests'
    files: ['tests/**/*', '**/*.spec.ts']
  - label: 'dependencies'
    files: ['package.json', 'package-lock.json', 'pnpm-lock.yaml']
  - label: 'fix'
    title: ['/^fix/i', '/^bug/i']
  - label: 'feature'
    title: ['/^feat/i', '/^feature/i']
  - label: 'chore'
    title: ['/^chore/i', '/^refactor/i']

template: |
  ## What's Changed in v$RESOLVED_VERSION

  $CHANGES

  **Full Changelog:** https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
