version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
    # @playwright/test is bumped together with the Docker image tag by the
    # "Check for Playwright updates" workflow (playwright-update.yml), so let that
    # own it to avoid duplicate, conflicting PRs.
    ignore:
      - dependency-name: "@playwright/test"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(ci)"
    labels:
      - "ci"
      - "dependencies"
